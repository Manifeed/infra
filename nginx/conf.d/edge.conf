log_format edge_json escape=json
  "{"
    "\"time\":\"$time_iso8601\","
    "\"remote_addr\":\"$remote_addr\","
    "\"method\":\"$request_method\","
    "\"uri\":\"$request_uri\","
    "\"status\":$status,"
    "\"bytes_sent\":$bytes_sent,"
    "\"referer\":\"$http_referer\","
    "\"user_agent\":\"$http_user_agent\","
    "\"route_class\":\"$edge_route_class\","
    "\"outcome\":\"$edge_outcome\""
  "}";
access_log /var/log/nginx/access.log edge_json;

map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

map $http_authorization $worker_limit_key {
  default $http_authorization;
  "" $binary_remote_addr;
}

map $request_uri $edge_route_class {
  default "frontend";
  ~^/_next/ "frontend-asset";
  ~^/api/ "web-api";
  ~^/workers/api/ "worker-api";
  ~^/(?:wp-admin|wp-login\.php|xmlrpc\.php|phpmyadmin|pma|adminer|boaform|HNAP1|cgi-bin)(?:/|$) "bot-probe";
  ~^/(?:\.env|\.git|\.svn|vendor/phpunit|phpunit|server-status|actuator)(?:/|$) "bot-probe";
  ~^/(?:docs|redoc|openapi\.json)(?:/|$) "hidden";
  ~^/(?:auth|account)(?:/|$) "hidden";
}

map $status $edge_outcome {
  default "ok";
  404 "not_found";
  405 "method_blocked";
  429 "rate_limited";
  502 "upstream_bad_gateway";
  503 "upstream_unavailable";
  504 "upstream_timeout";
}

limit_req_zone $binary_remote_addr zone=auth_strict:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=password_strict:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_moderate:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=admin_moderate:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=sources_user_high:10m rate=180r/m;
limit_req_zone $worker_limit_key zone=workers_read:10m rate=240r/m;
limit_req_zone $worker_limit_key zone=workers_write:10m rate=180r/m;
limit_req_zone $worker_limit_key zone=workers_claim:10m rate=600r/m;

upstream public_api_upstream {
  server public_api:8000;
  keepalive 32;
}

upstream worker_service_upstream {
  server worker_service:8000;
  keepalive 32;
}

upstream frontend_upstream {
  server frontend_admin:3000;
  keepalive 32;
}

server {
  listen 80;
  server_name _;

  error_page 404 =404 /_edge-errors/404;
  error_page 405 =405 /_edge-errors/405;
  error_page 429 =429 /_edge-errors/429;
  error_page 502 =502 /_edge-errors/502;
  error_page 503 =503 /_edge-errors/503;
  error_page 504 =504 /_edge-errors/504;

  client_max_body_size 10m;
  proxy_connect_timeout 5s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Port $server_port;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;
  proxy_intercept_errors on;
  limit_req_status 429;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "same-origin" always;

  location = /_edge-errors/404 {
    internal;
    set $edge_error_heading "404 Not Found";
    set $edge_error_message "This page does not exist.";
    include /etc/nginx/snippets/error-page-base.conf;
  }

  location = /_edge-errors/405 {
    internal;
    set $edge_error_heading "405 Method Not Allowed";
    set $edge_error_message "This endpoint does not accept your HTTP method.";
    include /etc/nginx/snippets/error-page-base.conf;
  }

  location = /_edge-errors/429 {
    internal;
    set $edge_error_heading "429 Too Many Requests";
    set $edge_error_message "Please wait and try again.";
    include /etc/nginx/snippets/error-page-base.conf;
    add_header Retry-After "60" always;
  }

  location = /_edge-errors/502 {
    internal;
    set $edge_error_heading "502 Bad Gateway";
    set $edge_error_message "The edge could not reach the upstream application cleanly.";
    include /etc/nginx/snippets/error-page-base.conf;
  }

  location = /_edge-errors/503 {
    internal;
    set $edge_error_heading "503 Service Unavailable";
    set $edge_error_message "The upstream application is temporarily unavailable.";
    include /etc/nginx/snippets/error-page-base.conf;
  }

  location = /_edge-errors/504 {
    internal;
    set $edge_error_heading "504 Gateway Timeout";
    set $edge_error_message "The upstream application took too long to respond.";
    include /etc/nginx/snippets/error-page-base.conf;
  }

  location ~* ^/(?:wp-admin|wp-login\.php|xmlrpc\.php|phpmyadmin|pma|adminer|boaform|HNAP1|cgi-bin)(?:/|$) {
    access_log off;
	return 404;
  }

  location ~* ^/(?:\.env|\.git|\.svn|vendor/phpunit|phpunit|server-status|actuator)(?:/|$) {
    access_log off;
    return 404;
  }

  location ~* \.(?:php|asp|aspx|jsp)$ {
    access_log off;
	return 404;
  }

  location = /docs {
    access_log off;
    return 404;
  }

  location = /redoc {
    access_log off;
    return 404;
  }

  location = /openapi.json {
    access_log off;
    return 404;
  }

  location = /favicon.ico {
    root /usr/share/nginx/html;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files /favicon.ico =404;
  }

  location ^~ /fonts/ {
    alias /usr/share/nginx/html/fonts/;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location = /api/auth/login {
    limit_req zone=auth_strict burst=5 nodelay;
    proxy_pass http://public_api_upstream;
  }

  location = /api/auth/register {
    limit_req zone=auth_strict burst=5 nodelay;
    proxy_pass http://public_api_upstream;
  }

  location = /api/account/password {
    limit_req zone=password_strict burst=2 nodelay;
    proxy_pass http://public_api_upstream;
  }

  location ^~ /api/admin/analysis/ {
    limit_req zone=admin_moderate burst=10 nodelay;
    proxy_pass http://public_api_upstream;
  }

  location ^~ /api/admin/health/ {
    limit_req zone=admin_moderate burst=10 nodelay;
    proxy_pass http://public_api_upstream;
  }

  location ^~ /api/admin/jobs {
    limit_req zone=admin_moderate burst=10 nodelay;
    proxy_pass http://public_api_upstream;
  }

  location ^~ /api/admin/rss {
    limit_req zone=admin_moderate burst=10 nodelay;
    proxy_pass http://public_api_upstream;
  }

  location ^~ /api/admin/sources {
    limit_req zone=admin_moderate burst=10 nodelay;
    proxy_pass http://public_api_upstream;
  }

  location ^~ /api/admin/ {
    limit_req zone=admin_moderate burst=10 nodelay;
    proxy_pass http://public_api_upstream;
  }

  location ^~ /api/sources/ {
    limit_req zone=sources_user_high burst=30 nodelay;
    proxy_pass http://public_api_upstream;
  }

  location ^~ /api/rss/ {
    limit_req zone=api_moderate burst=40 nodelay;
    proxy_pass http://public_api_upstream;
  }

  location ^~ /api/ {
    limit_req zone=api_moderate burst=15 nodelay;
    proxy_pass http://public_api_upstream;
  }

  location = /workers/api/tasks/claim {
    limit_req zone=workers_claim burst=80 nodelay;
    proxy_request_buffering off;
    proxy_read_timeout 300s;
    proxy_pass http://worker_service_upstream;
  }

  location ^~ /workers/api/tasks/ {
    limit_req zone=workers_write burst=40 nodelay;
    proxy_request_buffering off;
    proxy_read_timeout 300s;
    proxy_pass http://worker_service_upstream;
  }

  location ^~ /workers/api/sessions/ {
    limit_req zone=workers_write burst=40 nodelay;
    proxy_pass http://worker_service_upstream;
  }

  location = /workers/api/ping {
    limit_req zone=workers_read burst=40 nodelay;
    proxy_pass http://worker_service_upstream;
  }

  location ^~ /workers/api/releases/ {
    limit_req zone=workers_read burst=40 nodelay;
    proxy_pass http://worker_service_upstream;
  }

  location ^~ /workers/api/ {
    return 404;
  }

  location ^~ /workers/ {
    return 404;
  }

  location ^~ /_next/ {
    proxy_pass http://frontend_upstream;
  }

  location / {
    proxy_pass http://frontend_upstream;
  }
}
