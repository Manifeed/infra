<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manifeed</title>
    <link rel="icon" href="/errors/favicon.ico" sizes="any" />
    <style>
      :root {
        color-scheme: light;
        --white: #f9f8f6;
        --very-light-gray: #efeeec;
        --light-gray: #e1dfdb;
        --gray: #625f6d;
        --dark-gray: #2c2f3a;
        --blue: #003fe0;
        --orange: #df7700;
        --shadow: 0 24px 60px #0000001a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: clamp(1.5rem, 4vw, 3rem);
        background: var(--very-light-gray);
        color: var(--dark-gray);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      .panel {
        width: min(100%, 44rem);
        padding: clamp(1.5rem, 3vw, 2.5rem);
        border: 1px solid var(--light-gray);
        border-radius: 1.5rem;
        background: var(--white);
        box-shadow: var(--shadow);
        text-align: center;
      }

      .title {
        margin: 0.75rem 0 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.6rem, 8vw, 5rem);
        line-height: 0.98;
      }

      .message {
        margin: 1rem auto 0;
        max-width: 32rem;
        color: var(--gray);
        font-size: 1rem;
        line-height: 1.7;
      }

      .actions {
        margin-top: 1.75rem;
      }

      .boton-elegante {
      padding: 0.65rem 1rem;
      border: 2px solid var(--dark-gray);
      background-color: var(--dark-gray);
      color: var(--white);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1rem;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 30px;
      transition: 500ms;
      outline: none;
      position: relative;
      overflow: hidden;
    }

    .boton-elegante::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(
        circle,
        rgba(255, 255, 255, 0.1) 0%,
        rgba(255, 255, 255, 0) 70%
      );
      transform: scale(0);
      transition: transform 500ms ease;
    }

    .boton-elegante:hover::after {
      transform: scale(1);
    }

    .boton-elegante:hover {
      border-color: var(--gray);
      letter-spacing: 0.15rem;
    }
    </style>
  </head>
  <body>
    <main class="panel" aria-labelledby="error-title">
      <h1 id="error-title" class="title"><!--# echo var="edge_error_heading" default="Manifeed Error" --></h1>
      <p class="message"><!--# echo var="edge_error_message" default="The edge could not complete your request." --></p>
      <div class="actions">
        <a class="boton-elegante" href="/">Home</a>
      </div>
    </main>
  </body>
</html>
