<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Manifeed</title>
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<style>
			:root {
				color-scheme: light;
				--white: #f9f8f6;
				--very-light-gray: #efeeec;
				--light-gray: #e1dfdb;
				--gray: #625f6d;
				--dark-gray: #2c2f3a;
				--blue: #003fe0;
				--orange: #df7700;
				--shadow: 0 24px 60px #0000001a;
			}
			@font-face {
				font-family: 'Space Grotesk';
				src: url('/fonts/SpaceGrotesk-VariableFont_wght.ttf') format('truetype');
				font-weight: 300 700;
				font-style: normal;
				font-display: swap;
			}

			@font-face {
				font-family: 'Liberation';
				src: url('/fonts/LiberationSerif-Bold.ttf') format('truetype');
				font-weight: 700;
				font-style: normal;
				font-display: swap;
			}

			* {
				box-sizing: border-box;
			}

			html,
			body {
				margin: 0;
				min-height: 100%;
			}

			body {
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: clamp(1.5rem, 4vw, 3rem);
				background: var(--very-light-gray);
				color: var(--dark-gray);
				font-family: 'Space Grotesk', "Trebuchet MS", "Segoe UI", sans-serif;
			}

			.panel {
				width: fit-content;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 1rem;
				max-width: 100%;
				padding: 2.5rem;
				text-align: center;
			}

			.glassmorph {
				background-color: rgba(255, 255, 255, 0.2); /* Transparence ajoutée */
				backdrop-filter: blur(30px);
				border-radius: 1rem;
				box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1), inset -0.2rem -0.2rem 0.2rem rgba(0, 0, 0, 0.02), inset 0.2rem 0.2rem 0.2rem rgba(255, 255, 255, 0.1);
			}

			.title {
				margin: 0;
				font-family: 'Liberation';
				font-size: clamp(2.6rem, 8vw, 5rem);
			}

			.message {
				margin: 0;
				max-width: 32rem;
				color: var(--gray);
				font-size: clamp(1rem, 2vw, 1.2rem);
				line-height: 1.2;
			}

			.boton-elegante {
				padding: 0.65rem 1rem;
				border: 2px solid var(--dark-gray);
				background-color: var(--dark-gray);
				color: var(--white);
				font-size: 0.85rem;
				font-weight: 600;
				letter-spacing: 0.1rem;
				text-decoration: none;
				text-transform: uppercase;
				cursor: pointer;
				border-radius: 30px;
				transition: 500ms;
			}

			.boton-elegante::after {
				content: "";
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: radial-gradient(
					circle,
					rgba(255, 255, 255, 0.1) 0%,
					rgba(255, 255, 255, 0) 70%
				);
				transform: scale(0);
				transition: all 500ms ease;
			}

			.boton-elegante:hover::after {
				transform: scale(1);
			}

			.boton-elegante:hover {
				border-color: var(--gray);
				transform: scale(1.10);
			}

			.background {
				height: 100%;
				width: 100%;
				position: fixed;
				top: 0;
				left: 0;
			}
			.bubble {
				opacity: 15%;
				width: 120%;
				height: 120%;
				border-radius: 50%;
				filter: blur(5000px);
				position: absolute;
				transform: translateX(-50%) translateY(-50%);
			}
			.blue {
				background-color: var(--blue);
				top: 100%;
				left: 0;
			}
			.orange {
				background-color: var(--orange);
				top: 0;
				left: 100%;
			}
	</style>
</head>
<body>
	<div class="background">
		<div class="bubble blue"></div>
		<div class="bubble orange"></div>
	</div>
	<main class="panel glassmorph" aria-labelledby="error-title">
			<h1 id="error-title" class="title"><!--# echo var="edge_error_heading" default="Manifeed Error" --></h1>
			<p class="message"><!--# echo var="edge_error_message" default="The edge could not complete your request." --></p>
			<a class="boton-elegante" href="/">Home</a>
		</main>
	</body>
</html>
