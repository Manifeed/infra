worker_processes auto;

events {
  worker_connections 1024;
}

http {
  upstream frontend_upstream {
    server frontend_admin:3000;
  }

  upstream backend_upstream {
    server backend:8000;
  }

  real_ip_header X-Forwarded-For;
  real_ip_recursive on;
  set_real_ip_from 127.0.0.1/32;
  set_real_ip_from 10.0.0.0/8;
  set_real_ip_from 172.16.0.0/12;
  set_real_ip_from 192.168.0.0/16;

  limit_req_zone $binary_remote_addr zone=auth_login_ip:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=auth_register_ip:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=api_catalog_ip:10m rate=120r/m;
  limit_req_zone $binary_remote_addr zone=workers_ip:10m rate=300r/m;

  server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Forwarded "for=$remote_addr;proto=$scheme;host=$host";

    location = /api/auth/login {
      limit_req zone=auth_login_ip burst=10 nodelay;
      proxy_pass http://backend_upstream;
    }

    location = /api/auth/register {
      limit_req zone=auth_register_ip burst=3 nodelay;
      proxy_pass http://backend_upstream;
    }

    location /api/ {
      limit_req zone=api_catalog_ip burst=30 nodelay;
      proxy_pass http://backend_upstream;
    }

    location /workers/ {
      limit_req zone=workers_ip burst=100 nodelay;
      proxy_pass http://backend_upstream;
    }

    location = /openapi.json {
      proxy_pass http://backend_upstream;
    }

    location = /docs {
      proxy_pass http://backend_upstream;
    }

    location /docs/ {
      proxy_pass http://backend_upstream;
    }

    location = /redoc {
      proxy_pass http://backend_upstream;
    }

    location /redoc/ {
      proxy_pass http://backend_upstream;
    }

    location / {
      proxy_pass http://frontend_upstream;
    }
  }
}
