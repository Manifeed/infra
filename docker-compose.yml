services:
  postgres:
    image: postgres:15
    container_name: manifeed_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-manifeed_content}
      POSTGRES_USER: ${POSTGRES_USER:-manifeed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-manifeed}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-manifeed} -d ${POSTGRES_DB:-manifeed_content}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - manifeed_internal

  redis:
    image: redis/redis-stack-server:latest
    container_name: manifeed_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - manifeed_internal

  qdrant:
    image: qdrant/qdrant:latest
    container_name: manifeed_qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - manifeed_internal

  db_migrations:
    image: manifeed_db_migrations:local
    build:
      context: ./postgres_migration
      dockerfile: Dockerfile
      provenance: false
      sbom: false
    environment:
      POSTGRES_ADMIN_DATABASE: ${POSTGRES_DB:-manifeed_content}
      CONTENT_DATABASE_URL: postgresql://${POSTGRES_USER:-manifeed}:${POSTGRES_PASSWORD:-manifeed}@postgres:5432/${CONTENT_POSTGRES_DB:-manifeed_content}
      IDENTITY_DATABASE_URL: postgresql://${POSTGRES_USER:-manifeed}:${POSTGRES_PASSWORD:-manifeed}@postgres:5432/${IDENTITY_POSTGRES_DB:-manifeed_identity}
      WORKERS_DATABASE_URL: postgresql://${POSTGRES_USER:-manifeed}:${POSTGRES_PASSWORD:-manifeed}@postgres:5432/${WORKERS_POSTGRES_DB:-manifeed_workers}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: ["python", "migrate_all.py"]
    volumes:
      - ./postgres_migration/alembic:/app/alembic:z
      - ./postgres_migration/alembic.ini:/app/alembic.ini:z
      - ./postgres_migration/migrate_all.py:/app/migrate_all.py:z
    networks:
      - manifeed_internal
    restart: "no"

  edge_nginx:
    image: nginx:1.27-alpine
    container_name: manifeed_edge_nginx
    depends_on:
      public_api:
        condition: service_healthy
      worker_service:
        condition: service_started
      frontend_admin:
        condition: service_started
    ports:
      - "${EDGE_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/errors:/usr/share/nginx/html/errors:ro
      - ./nginx/fonts:/usr/share/nginx/html/fonts:ro
      - ./nginx/favicon.ico:/usr/share/nginx/html/favicon.ico:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/login || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - manifeed_internal
      - manifeed_public
    restart: unless-stopped

  public_api:
    image: manifeed_public_api:local
    build:
      context: ${MANIFEED_MULTI_REPO_PATH:-..}
      dockerfile: public_api/Dockerfile
      provenance: false
      sbom: false
    container_name: manifeed_public_api
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:8080}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}
      ALLOWED_HOSTS: ${PUBLIC_API_ALLOWED_HOSTS:-public_api,manifeed_public_api}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RATE_LIMIT_REDIS_REQUIRED: ${RATE_LIMIT_REDIS_REQUIRED:-false}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth_service:8000}
      AUTH_SERVICE_TIMEOUT_SECONDS: ${AUTH_SERVICE_TIMEOUT_SECONDS:-5}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user_service:8000}
      USER_SERVICE_TIMEOUT_SECONDS: ${USER_SERVICE_TIMEOUT_SECONDS:-5}
      ADMIN_SERVICE_URL: ${ADMIN_SERVICE_URL:-http://admin_service:8000}
      ADMIN_SERVICE_TIMEOUT_SECONDS: ${ADMIN_SERVICE_TIMEOUT_SECONDS:-10}
      CONTENT_SERVICE_URL: ${CONTENT_SERVICE_URL:-http://content_service:8000}
      CONTENT_SERVICE_TIMEOUT_SECONDS: ${CONTENT_SERVICE_TIMEOUT_SECONDS:-10}
      WORKER_SERVICE_URL: ${WORKER_SERVICE_URL:-http://worker_service:8000}
      WORKER_SERVICE_TIMEOUT_SECONDS: ${WORKER_SERVICE_TIMEOUT_SECONDS:-10}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      REQUIRE_INTERNAL_SERVICE_TOKEN: ${REQUIRE_INTERNAL_SERVICE_TOKEN:-true}
      AUTH_SESSION_COOKIE_SECURE: ${AUTH_SESSION_COOKIE_SECURE:-true}
    depends_on:
      auth_service:
        condition: service_started
      user_service:
        condition: service_started
      admin_service:
        condition: service_started
      content_service:
        condition: service_started
      worker_service:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/internal/ready').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - manifeed_internal
    restart: unless-stopped

  admin_service:
    image: manifeed_admin_service:local
    build:
      context: ${MANIFEED_MULTI_REPO_PATH:-..}
      dockerfile: admin_service/Dockerfile
      provenance: false
      sbom: false
    container_name: manifeed_admin_service
    # RSS sync updates the bind-mounted /rss_feeds git repository during local dev.
    user: "0:0"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      CONTENT_DATABASE_URL: postgresql://${POSTGRES_USER:-manifeed}:${POSTGRES_PASSWORD:-manifeed}@postgres:5432/${CONTENT_POSTGRES_DB:-manifeed_content}
      IDENTITY_DATABASE_URL: postgresql://${POSTGRES_USER:-manifeed}:${POSTGRES_PASSWORD:-manifeed}@postgres:5432/${IDENTITY_POSTGRES_DB:-manifeed_identity}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:8080}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REQUIRE_EXPLICIT_DATABASE_URLS: ${REQUIRE_EXPLICIT_DATABASE_URLS:-false}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user_service:8000}
      USER_SERVICE_TIMEOUT_SECONDS: ${USER_SERVICE_TIMEOUT_SECONDS:-5}
      WORKER_SERVICE_URL: ${WORKER_SERVICE_URL:-http://worker_service:8000}
      WORKER_SERVICE_TIMEOUT_SECONDS: ${WORKER_SERVICE_TIMEOUT_SECONDS:-10}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      REQUIRE_INTERNAL_SERVICE_TOKEN: ${REQUIRE_INTERNAL_SERVICE_TOKEN:-true}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-article_embeddings}
      SOURCE_EMBEDDING_DIMENSIONS: ${SOURCE_EMBEDDING_DIMENSIONS:-1024}
      RSS_FEEDS_REPOSITORY_PATH: ${RSS_FEEDS_REPOSITORY_PATH:-/rss_feeds}
      AUTH_SESSION_COOKIE_SECURE: ${AUTH_SESSION_COOKIE_SECURE:-true}
    depends_on:
      user_service:
        condition: service_started
      worker_service:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/internal/health').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${ADMIN_SERVICE_REPO_PATH:-../admin_service}:/app:z
      - ${RSS_FEEDS_HOST_PATH:-../../rss_feeds}:/rss_feeds:z
    networks:
      - manifeed_internal
    dns:
      - 8.8.8.8
    restart: unless-stopped

  content_service:
    image: manifeed_content_service:local
    build:
      context: ${MANIFEED_MULTI_REPO_PATH:-..}
      dockerfile: content_service/Dockerfile
      provenance: false
      sbom: false
    container_name: manifeed_content_service
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      CONTENT_READ_DATABASE_URL: ${CONTENT_READ_DATABASE_URL:-}
      CONTENT_DATABASE_URL: postgresql://${POSTGRES_USER:-manifeed}:${POSTGRES_PASSWORD:-manifeed}@postgres:5432/${CONTENT_POSTGRES_DB:-manifeed_content}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:8080}
      REQUIRE_EXPLICIT_DATABASE_URLS: ${REQUIRE_EXPLICIT_DATABASE_URLS:-false}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      REQUIRE_INTERNAL_SERVICE_TOKEN: ${REQUIRE_INTERNAL_SERVICE_TOKEN:-true}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-article_embeddings}
      SOURCE_EMBEDDING_DIMENSIONS: ${SOURCE_EMBEDDING_DIMENSIONS:-1024}
      RSS_FEEDS_REPOSITORY_PATH: ${RSS_FEEDS_REPOSITORY_PATH:-/rss_feeds}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/internal/health').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${CONTENT_SERVICE_REPO_PATH:-../content_service}:/app:z
      - ${RSS_FEEDS_HOST_PATH:-../../rss_feeds}:/rss_feeds:z
    networks:
      - manifeed_internal
    dns:
      - 8.8.8.8
    restart: unless-stopped

  worker_service:
    image: manifeed_worker_service:local
    build:
      context: ${MANIFEED_MULTI_REPO_PATH:-..}
      dockerfile: worker_service/Dockerfile
      provenance: false
      sbom: false
    container_name: manifeed_worker_service
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      CONTENT_DATABASE_URL: postgresql://${POSTGRES_USER:-manifeed}:${POSTGRES_PASSWORD:-manifeed}@postgres:5432/${CONTENT_POSTGRES_DB:-manifeed_content}
      IDENTITY_DATABASE_URL: postgresql://${POSTGRES_USER:-manifeed}:${POSTGRES_PASSWORD:-manifeed}@postgres:5432/${IDENTITY_POSTGRES_DB:-manifeed_identity}
      WORKERS_DATABASE_URL: postgresql://${POSTGRES_USER:-manifeed}:${POSTGRES_PASSWORD:-manifeed}@postgres:5432/${WORKERS_POSTGRES_DB:-manifeed_workers}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}
      REQUIRE_EXPLICIT_DATABASE_URLS: ${REQUIRE_EXPLICIT_DATABASE_URLS:-false}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      REQUIRE_INTERNAL_SERVICE_TOKEN: ${REQUIRE_INTERNAL_SERVICE_TOKEN:-true}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-article_embeddings}
      SOURCE_EMBEDDING_DIMENSIONS: ${SOURCE_EMBEDDING_DIMENSIONS:-1024}
      RSS_WORKER_VERSION: ${RSS_WORKER_VERSION:-0.1.4}
      WORKER_RELEASE_CATALOG_PATH: /app/var/worker-releases/catalog.json
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/internal/health').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${WORKER_SERVICE_REPO_PATH:-../worker_service}:/app:z
    networks:
      - manifeed_internal
    restart: unless-stopped

  auth_service:
    image: manifeed_auth_service:local
    build:
      context: ${MANIFEED_MULTI_REPO_PATH:-..}
      dockerfile: auth_service/Dockerfile
      provenance: false
      sbom: false
    container_name: manifeed_auth_service
    environment:
      IDENTITY_DATABASE_URL: postgresql://${POSTGRES_USER:-manifeed}:${POSTGRES_PASSWORD:-manifeed}@postgres:5432/${IDENTITY_POSTGRES_DB:-manifeed_identity}
      REQUIRE_EXPLICIT_DATABASE_URLS: ${REQUIRE_EXPLICIT_DATABASE_URLS:-true}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      REQUIRE_INTERNAL_SERVICE_TOKEN: ${REQUIRE_INTERNAL_SERVICE_TOKEN:-true}
      DB_POOL_SIZE: ${AUTH_SERVICE_DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${AUTH_SERVICE_DB_MAX_OVERFLOW:-10}
      AUTH_SESSION_TOUCH_INTERVAL_SECONDS: ${AUTH_SESSION_TOUCH_INTERVAL_SECONDS:-300}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/internal/ready').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${AUTH_SERVICE_REPO_PATH:-../auth_service}:/app:z
    networks:
      - manifeed_internal
    restart: unless-stopped

  user_service:
    image: manifeed_user_service:local
    build:
      context: ${MANIFEED_MULTI_REPO_PATH:-..}
      dockerfile: user_service/Dockerfile
      provenance: false
      sbom: false
    container_name: manifeed_user_service
    environment:
      IDENTITY_DATABASE_URL: postgresql://${POSTGRES_USER:-manifeed}:${POSTGRES_PASSWORD:-manifeed}@postgres:5432/${IDENTITY_POSTGRES_DB:-manifeed_identity}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth_service:8000}
      AUTH_SERVICE_TIMEOUT_SECONDS: ${AUTH_SERVICE_TIMEOUT_SECONDS:-5}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      REQUIRE_INTERNAL_SERVICE_TOKEN: ${REQUIRE_INTERNAL_SERVICE_TOKEN:-true}
    depends_on:
      auth_service:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/internal/ready').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${USER_SERVICE_REPO_PATH:-../user_service}:/app:z
    networks:
      - manifeed_internal
    restart: unless-stopped

  frontend_admin:
    image: manifeed_frontend_admin:local
    build:
      context: ${FRONTEND_REPO_PATH:-../frontend}
      dockerfile: Dockerfile
      provenance: false
      sbom: false
    container_name: manifeed_frontend_admin
    environment:
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL_ADMIN:-http://public_api:8000}
    depends_on:
      - public_api
    networks:
      - manifeed_internal
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:

networks:
  manifeed_internal:
    driver: bridge
  manifeed_public:
    driver: bridge
