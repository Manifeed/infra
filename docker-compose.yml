services:
  postgres:
    image: postgres:15
    container_name: manifeed_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-manifeed}
      POSTGRES_USER: ${POSTGRES_USER:-manifeed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-manifeed}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-manifeed} -d ${POSTGRES_DB:-manifeed}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - manifeed_internal

  db_migrations:
    image: manifeed_db_migrations:local
    build:
      context: ./postgres_migration
      dockerfile: Dockerfile
      provenance: false
      sbom: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-manifeed}:${POSTGRES_PASSWORD:-manifeed}@postgres:5432/${POSTGRES_DB:-manifeed}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]
    volumes:
      - ./postgres_migration/alembic:/app/alembic:z
      - ./postgres_migration/alembic.ini:/app/alembic.ini:z
    networks:
      - manifeed_internal
    restart: "no"

  backend:
    image: manifeed_backend:local
    build:
      context: ${BACKEND_REPO_PATH:-../backend}
      dockerfile: Dockerfile
      provenance: false
      sbom: false
    container_name: manifeed_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-manifeed}:${POSTGRES_PASSWORD:-manifeed}@postgres:5432/${POSTGRES_DB:-manifeed}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-Xenova/multilingual-e5-large}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      RSS_FEEDS_REPOSITORY_PATH: ${RSS_FEEDS_REPOSITORY_PATH:-/rss_feeds}
      WORKER_ENROLLMENT_TOKENS: ${WORKER_ENROLLMENT_TOKENS:-rss_scrapper:manifeed-rss-enroll,source_embedding:manifeed-embedding-enroll}
      WORKER_TOKEN_SECRET: ${WORKER_TOKEN_SECRET:-manifeed-worker-token-secret}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${BACKEND_REPO_PATH:-../backend}:/app:z
      - ${RSS_FEEDS_HOST_PATH:-../../rss_feeds}:/rss_feeds:z
    networks:
      - manifeed_internal
      - manifeed_public
    dns:
      - 8.8.8.8
    restart: unless-stopped

  frontend_admin:
    build:
      context: ${FRONTEND_REPO_PATH:-../frontend}
      dockerfile: Dockerfile
      provenance: false
      sbom: false
    container_name: manifeed_frontend_admin
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL_ADMIN:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "${ADMIN_PORT:-3000}:3000"
    volumes:
      - ${FRONTEND_REPO_PATH:-../frontend}:/app:z
      - frontend_admin_node_modules:/app/node_modules
    networks:
      - manifeed_public
    restart: unless-stopped

volumes:
  pgdata:
  frontend_admin_node_modules:

networks:
  manifeed_internal:
    driver: bridge
  manifeed_public:
    driver: bridge
